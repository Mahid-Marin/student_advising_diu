<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        .test { my: 10px; padding: 10px; border: 1px solid #ccc; margin: 10px 0; }
        .success { background: #d4edda; }
        .error { background: #f8d7da; }
        textarea { width: 100%; height: 200px; }
    </style>
</head>
<body>
    <h1>API Debugging Tool</h1>
    
    <h2>Test Login Endpoint</h2>
    <button onclick="testLogin()">🔓 Test Login</button>
    <div id="result" class="test"></div>
    
    <h2>Response Details</h2>
    <textarea id="response" placeholder="Response will appear here..."></textarea>
    
    <script>
        async function testLogin() {
            const resultDiv = document.getElementById('result');
            const responseArea = document.getElementById('response');
            
            try {
                resultDiv.className = 'test';
                resultDiv.innerHTML = '⏳ Sending request...';
                
                const response = await fetch('http://localhost:8080/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'john@example.com',
                        password: 'password123'
                    })
                });
                
                const data = await response.json();
                
                resultDiv.className = response.ok ? 'test success' : 'test error';
                resultDiv.innerHTML = `
                    <strong>Status:</strong> ${response.status}<br>
                    <strong>Success:</strong> ${data.success}<br>
                    <strong>Message:</strong> ${data.message}<br>
                    <strong>Token:</strong> ${data.token ? data.token.substring(0, 20) + '...' : 'N/A'}
                `;
                
                responseArea.value = JSON.stringify(data, null, 2);
                
            } catch (error) {
                resultDiv.className = 'test error';
                resultDiv.innerHTML = `<strong>Error:</strong> ${error.message}`;
                responseArea.value = error.toString();
            }
        }
    </script>
</body>
</html>
